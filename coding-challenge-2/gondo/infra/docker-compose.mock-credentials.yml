# Optional overlay: bind-mount mock secrets JSON so edits apply without image rebuild.
# Usage (cwd = gondo/): docker compose -f docker-compose.yml -f infra/docker-compose.mock-credentials.yml up -d provider-service carrier-service
services:
  provider-service:
    volumes:
      - ../infra/credentials/mock:/app/infra/credentials/mock:ro
    environment:
      MOCK_CREDENTIALS_PATH: /app/infra/credentials/mock/secrets.json
  carrier-service:
    volumes:
      - ../infra/credentials/mock:/app/infra/credentials/mock:ro
    environment:
      MOCK_CREDENTIALS_PATH: /app/infra/credentials/mock/secrets.json
