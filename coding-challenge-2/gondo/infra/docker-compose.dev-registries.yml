# Convenience overlay: live-edit provider registry, carrier registry, and mock credentials in one -f.
# Usage (cwd = gondo/):
#   docker-compose -f docker-compose.yml -f infra/docker-compose.dev-registries.yml up -d
services:
  provider-service:
    volumes:
      - ../infra/provider-registry:/app/infra/provider-registry:ro
      - ../infra/credentials/mock:/app/infra/credentials/mock:ro
    environment:
      PROVIDER_REGISTRY_ROOT: /app/infra/provider-registry
      MOCK_CREDENTIALS_PATH: /app/infra/credentials/mock/secrets.json
  carrier-service:
    volumes:
      - ../infra/carrier-registry:/app/infra/carrier-registry:ro
      - ../infra/credentials/mock:/app/infra/credentials/mock:ro
    environment:
      CARRIER_REGISTRY_ROOT: /app/infra/carrier-registry
      MOCK_CREDENTIALS_PATH: /app/infra/credentials/mock/secrets.json
