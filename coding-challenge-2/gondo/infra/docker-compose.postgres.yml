# Standalone Postgres for local dev (run apps via Nx on the host, DB in Docker).
# Usage (cwd = gondo/): docker-compose -f infra/docker-compose.postgres.yml up -d
# Connection: postgresql://gondo:gondo@localhost:5432/gondo
name: gondo-postgres

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gondo
      POSTGRES_PASSWORD: gondo
      POSTGRES_DB: gondo
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gondo -d gondo"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  pgdata_dev:
