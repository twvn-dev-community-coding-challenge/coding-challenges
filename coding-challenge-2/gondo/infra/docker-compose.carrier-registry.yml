# Optional overlay: bind-mount carrier (MNO) YAML registry for local edits without rebuild.
# Usage (cwd = gondo/): docker-compose -f docker-compose.yml -f infra/docker-compose.carrier-registry.yml up -d carrier-service
services:
  carrier-service:
    volumes:
      - ../infra/carrier-registry:/app/infra/carrier-registry:ro
    environment:
      CARRIER_REGISTRY_ROOT: /app/infra/carrier-registry
