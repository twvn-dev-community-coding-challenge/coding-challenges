# Used by docker-compose Prometheus service.
# Scrapes the `api` service when running in Docker Compose (see root docker-compose.yml).
# To scrape a host-only API instead, change targets to host.docker.internal:8080.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sms-otp-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080
        labels:
          service: sms-otp-api
